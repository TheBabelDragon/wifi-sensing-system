[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5
    tzapu/WiFiManager @ ^2.0.17
build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D HAS_DISPLAY=0

; Standard ESP32 (WROOM-32UE, DevKit, etc.)
[env:esp32-standard]
extends = env:esp32dev
build_flags =
    -D HAS_DISPLAY=0

; Cheap Yellow Display (ESP32-2432S028)
[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^6.21.5
    tzapu/WiFiManager @ ^2.0.17
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    -D HAS_DISPLAY=1
    -D USER_SETUP_LOADED
    -D ILI9341_DRIVER
    -D TFT_WIDTH=240
    -D TFT_HEIGHT=320
    -D TFT_MISO=12
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1
    -D TFT_BL=21
    -D TOUCH_CS=33
    -D SPI_FREQUENCY=40000000
    -D SPI_READ_FREQUENCY=20000000
