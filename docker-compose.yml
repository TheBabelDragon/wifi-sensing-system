version: '3.8'

services:
  csi-system:
    build: .
    container_name: wifi-csi-intelligence
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SIMULATION_FRAMES=10
      - ROOM_NAME=mining_hall
    ports:
      - "8000:8000"      # Central dashboard
      - "8001:8001"      # Prometheus metrics
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: csi-redis
    ports:
      - "6379:6379"
    restart: unless-stopped